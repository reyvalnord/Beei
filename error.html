<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 // NOT FOUND</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #05080a; /* Warna background sama dengan san.html */
      color: #00d2ff; /* Warna neon-blue dari san.html */
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-container {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      border: 1px solid rgba(0, 210, 255, 0.3);
      background: rgba(0, 20, 30, 0.6);
    }

    .code {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
    }

    .divider {
      width: 1px;
      height: 40px;
      background-color: rgba(0, 210, 255, 0.5);
    }

    .message {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b3e5fc; /* Warna text-main dari san.html */
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="code">404</div>
    <div class="divider"></div>
    <div class="message">This page could not be found.</div>
  </div>

</body>
</html>
